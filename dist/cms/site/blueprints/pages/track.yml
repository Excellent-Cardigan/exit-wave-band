title: Track
icon: music

tabs:
  info:
    label: Info
    fields:
      title:
        label: Title
        type: text
        required: true
        help: The track name as it appears publicly

      album:
        label: Album
        type: text
        help: EP or album name (e.g. Night Hymns, Demos Vol. 1)

      track_status:
        label: Status
        type: select
        required: true
        help: Controls the badge shown in the archive terminal
        options:
          final: Final
          demo: Demo
          b-side: B-Side

      featured:
        label: Featured Track
        type: toggle
        text: ["No", "Yes"]
        help: Hero card on the home page — only one track should be featured

      bpm:
        label: BPM
        type: number
        min: 60
        max: 200
        help: Beats per minute

      duration:
        label: Duration
        type: text
        placeholder: "4:32"
        help: "Format: M:SS — enter manually"

      stems:
        label: Stems Available
        type: toggle
        text: ["No", "Yes"]
        help: Are stems available for remix/licensing?

  files:
    label: Files
    columns:
      cover:
        width: 1/2
        sections:
          cover_files:
            type: files
            template: cover
            label: Cover Art
            max: 1
            layout: cards

      audio:
        width: 1/2
        sections:
          audio_files:
            type: files
            template: audio
            label: Audio File
            max: 1
            layout: list
